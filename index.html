<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة تيمي الخاصة 💖</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff0f3;
            color: #4a4a4a;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: #ff4d6d; margin-bottom: 10px; }

        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }

        .level-badge {
            background: #ff758f;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            display: inline-block;
        }

        .question { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #590d22; }

        input[type="text"] {
            width: 85%;
            padding: 12px;
            border: 2px solid #ffb3c1;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            margin-bottom: 15px;
            text-align: center;
        }

        button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 17px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
        }

        #feedback { margin-top: 10px; font-weight: bold; height: 20px; }

        .puzzle-title { margin-top: 20px; font-weight: bold; color: #ff4d6d; }
        
        #puzzle-box {
            width: 300px;
            height: 400px;
            border: 5px solid #ff4d6d;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            background-color: #ffe5ec;
            margin: 15px auto;
            position: relative;
            overflow: hidden;
        }

        .piece {
            width: 30px;
            height: 40px;
            border: 0.1px solid rgba(255, 255, 255, 0.2);
            background-repeat: no-repeat;
            background-size: 300px 400px;
            opacity: 0;
            transition: opacity 0.4s ease-in;
        }

        .piece.unlocked { opacity: 1; border: none; }

        #final-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 240, 243, 0.98);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>🌸 رحلة تيمي 🌸</h1>

    <div class="container">
        <div class="level-badge" id="level-indicator">المستوى 1 / 100</div>
        <div class="question" id="question-text">جاري التحميل...</div>
        
        <div id="game-ui">
            <input type="text" id="user-answer" placeholder="اكتبي الإجابة هنا..." autocomplete="off">
            <br>
            <button onclick="checkAnswer()">تأكيد الإجابة ✨</button>
        </div>
        <div id="feedback"></div>
    </div>

    <div class="puzzle-title">📦 صندوق تجميع الصورة السرية</div>
    <div id="puzzle-box"></div>

    <div id="final-screen">
        <h1 style="font-size: 32px; color: #ff4d6d;">🎉 مبروك يا تيمي! 🎉</h1>
        <p style="font-size: 18px;">اكتملت كل القطع واكتملت الصورة بالكامل ✨</p>
        <div id="final-image-container" style="width:300px; height:400px; border: 5px solid #ff4d6d; border-radius: 12px; background-size: cover; background-image: url('../input_file_0.png');"></div>
        <br>
        <button onclick="location.reload()">إعادة اللعب ❤️</button>
    </div>

    <script>
        const imageUrl = '../input_file_0.png';
        const totalLevels = 100;
        let currentLevel = 0;

        // قائمة متنوعة من الألغاز والمسائل الرياضية والأسئلة العامة السهلة
        const easyQuestions = [
            // ألغاز واسئلة عامة
            { q: "لغز: ما هو الشيء الذي له عين واحدة ولكنه لا يرى؟", a: "الابرة" },
            { q: "رياضيات: كم ناتج 5 + 5؟", a: "10" },
            { q: "معلومات عامة: ما هو المشروب الذي تنتجه البقرة؟", a: "الحليب" },
            { q: "لغز: شيء كلما أخذت منه كبر، فما هو؟", a: "الحفرة" },
            { q: "رياضيات: كم ناتج 10 - 3؟", a: "7" },
            { q: "معلومات عامة: ما هو لون السماء في النهار الصافي؟", a: "ازرق" },
            { q: "لغز: ما هو الشيء الذي يمشي بلا أقدام؟", a: "الصوت" },
            { q: "رياضيات: كم ناتج 2 × 4؟", a: "8" },
            { q: "معلومات عامة: كم عدد أيام الأسبوع؟", a: "7" },
            { q: "لغز: ما هو الشيء الذي يبكي بلا عيون ويطير بلا أجنحة؟", a: "السحاب" },
            { q: "رياضيات: كم ناتج 20 ÷ 2؟", a: "10" },
            { q: "معلومات عامة: ما هي الوجبة التي نأكلها في الصباح؟", a: "الافطار" },
            { q: "لغز: شيء يوجد في السكّر ولا يوجد في الملح؟", a: "حرف السين" },
            { q: "رياضيات: كم ناتج 15 + 5؟", a: "20" },
            { q: "معلومات عامة: ما هو الحيوان الملقب بملك الغابة؟", a: "الاسد" }
        ];

        // تكملة باقي الـ 100 مستوى بمسائل رياضية وأسئلة سهلة ومباشرة
        const allLevels = [...easyQuestions];
        for (let i = allLevels.length + 1; i <= totalLevels; i++) {
            if (i % 2 === 0) {
                allLevels.push({ q: `مسألة رياضية: كم ناتج ${i} + 10؟`, a: `${i + 10}` });
            } else {
                allLevels.push({ q: `سؤال سريع: كم عدد أرقام العدد ${i}؟`, a: `${String(i).length}` });
            }
        }

        // ترتيب عشوائي لفتح قطع الصورة
        let piecesOrder = Array.from({length: 100}, (_, i) => i);
        piecesOrder = piecesOrder.sort(() => Math.random() - 0.5);

        // إنشاء شبكة الـ 100 قطعة
        const puzzleBox = document.getElementById('puzzle-box');
        for (let i = 0; i < 100; i++) {
            const piece = document.createElement('div');
            piece.className = 'piece';
            piece.id = `piece-${i}`;
            const row = Math.floor(i / 10);
            const col = i % 10;
            piece.style.backgroundImage = `url('${imageUrl}')`;
            piece.style.backgroundPosition = `-${col * 30}px -${row * 40}px`;
            puzzleBox.appendChild(piece);
        }

        function checkAnswer() {
            const input = document.getElementById('user-answer').value.trim();
            const feedback = document.getElementById('feedback');

            if (input === allLevels[currentLevel].a || input.toLowerCase() === allLevels[currentLevel].a) {
                feedback.style.color = "green";
                feedback.innerText = "إجابة صحيحة! ✨ تم فتح قطعة جديدة.";
                
                // إظهار قطعة عشوائية في الصندوق
                const pieceToUnlock = piecesOrder[currentLevel];
                document.getElementById(`piece-${pieceToUnlock}`).classList.add('unlocked');
                
                currentLevel++;

                if (currentLevel >= totalLevels) {
                    setTimeout(() => {
                        document.getElementById('final-screen').style.display = 'flex';
                    }, 800);
                } else {
                    setTimeout(nextLevel, 700);
                }
            } else {
                feedback.style.color = "red";
                feedback.innerText = "إجابة خاطئة.. حاولي مرة أخرى! ❌";
            }
        }

        function nextLevel() {
            document.getElementById('level-indicator').innerText = `المستوى ${currentLevel + 1} / 100`;
            document.getElementById('question-text').innerText = allLevels[currentLevel].q;
            document.getElementById('user-answer').value = "";
            document.getElementById('feedback').innerText = "";
        }

        // بدء اللعبة
        nextLevel();
    </script>
</body>
</html>
