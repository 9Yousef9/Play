<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة تيمي الخاصة 💖</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff0f3;
            color: #4a4a4a;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: #ff4d6d; margin-bottom: 5px; }

        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
            margin-bottom: 15px;
        }

        .level-badge {
            background: #ff758f;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            display: inline-block;
        }

        .question { font-size: 19px; font-weight: bold; margin-bottom: 20px; color: #590d22; }

        input[type="text"] {
            width: 85%;
            padding: 12px;
            border: 2px solid #ffb3c1;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            margin-bottom: 15px;
            text-align: center;
        }

        button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
            margin: 3px;
        }

        .reset-btn {
            background: #adb5bd;
            font-size: 13px;
            padding: 6px 12px;
            box-shadow: none;
        }

        #feedback { margin-top: 10px; font-weight: bold; height: 20px; }

        .puzzle-title { margin-top: 10px; font-weight: bold; color: #ff4d6d; }
        
        #puzzle-box {
            width: 300px;
            height: 400px;
            border: 5px solid #ff4d6d;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            background-color: #ffe5ec;
            margin: 10px auto;
            position: relative;
            overflow: hidden;
        }

        .piece {
            width: 30px;
            height: 40px;
            border: 0.1px solid rgba(255, 255, 255, 0.2);
            background-repeat: no-repeat;
            background-size: 300px 400px;
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }

        .piece.unlocked { opacity: 1; border: none; }

        #final-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 240, 243, 0.98);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>🌸 رحلة تيمي 🌸</h1>

    <div class="container">
        <div class="level-badge" id="level-indicator">المستوى 1 / 100</div>
        <div class="question" id="question-text">جاري التحميل...</div>
        
        <div id="game-ui">
            <input type="text" id="user-answer" placeholder="اكتبي الإجابة هنا..." autocomplete="off">
            <br>
            <button onclick="checkAnswer()">تأكيد الإجابة ✨</button>
            <br>
            <button class="reset-btn" onclick="resetGame()">إعادة اللعبة من الأول 🔄</button>
        </div>
        <div id="feedback"></div>
    </div>

    <div class="puzzle-title">📦 صندوق تجميع الصورة السرية</div>
    <div id="puzzle-box"></div>

    <div id="final-screen">
        <h1 style="font-size: 32px;">🎉 مبروك يا تيمي! 🎉</h1>
        <p style="font-size: 18px;">لقد جمعتِ الـ 100 قطعة واكتملت الصورة بنجاح ✨</p>
        <div id="final-image-container" style="width:300px; height:400px; border: 5px solid #ff4d6d; border-radius: 12px; background-size: cover; background-image: url('../input_file_0.png');"></div>
        <br>
        <button onclick="resetGame()">إعادة اللعب من جديد ❤️</button>
    </div>

    <script>
        const imageUrl = '../input_file_0.png';
        const totalLevels = 100;

        // استرجاع التقدم المحفوظ أو البدء من 0
        let currentLevel = parseInt(localStorage.getItem('timi_game_level')) || 0;

        const baseQuestions = [
            { q: "ما هو لون السماء في النهار؟", a: ["ازرق", "أزرق"] },
            { q: "كم عدد أيام الأسبوع؟", a: ["7", "سبعة"] },
            { q: "ما هو الشيء الذي يزيد إذا تشاركته ويكبر بالحب؟", a: ["الحب", "حب"] },
            { q: "ما هو ناتج 5 + 5 ؟", a: ["10", "عشرة"] },
            { q: "ما هو الشيء الذي يتكلم جميع اللغات لكنه بلا لسان؟", a: ["الصدى", "صدى", "صدى الصوت"] },
            { q: "ما هو الشيء الذي له عين واحدة ولكنه لا يرى؟", a: ["الابرة", "الإبرة", "إبرة", "ابرة"] },
            { q: "ما هو ناتج 2 + 2 ؟", a: ["4", "اربعة", "أربعة"] },
            { q: "ما هو لون القلب الشائع للحب؟", a: ["احمر", "أحمر"] },
            { q: "ما هو ناتج 10 - 5 ؟", a: ["5", "خمسة"] },
            { q: "اكتبي كلمة (أحبك) لفتح القطعة التالية!", a: ["احبك", "أحبك"] }
        ];

        const allLevels = [];
        for (let i = 0; i < totalLevels; i++) {
            if (i < baseQuestions.length) {
                allLevels.push(baseQuestions[i]);
            } else {
                allLevels.push({
                    q: `تحدي بسيط: ما هو ناتج ${i + 1} + 1 ؟`,
                    a: [`${i + 2}`]
                });
            }
        }

        // إنشاء ترتيب ثوابت للقطع لضمان الحفظ
        let piecesOrder = JSON.parse(localStorage.getItem('timi_pieces_order'));
        if (!piecesOrder) {
            piecesOrder = Array.from({length: 100}, (_, i) => i).sort(() => Math.random() - 0.5);
            localStorage.setItem('timi_pieces_order', JSON.stringify(piecesOrder));
        }

        const puzzleBox = document.getElementById('puzzle-box');
        for (let i = 0; i < 100; i++) {
            const piece = document.createElement('div');
            piece.className = 'piece';
            piece.id = `piece-${i}`;
            const row = Math.floor(i / 10);
            const col = i % 10;
            piece.style.backgroundImage = `url('${imageUrl}')`;
            piece.style.backgroundPosition = `-${col * 30}px -${row * 40}px`;
            puzzleBox.appendChild(piece);
        }

        // إظهار القطع المفعلة المسبقة عند فتح الرابط
        function restoreProgress() {
            for (let i = 0; i < currentLevel; i++) {
                const pieceToUnlock = piecesOrder[i];
                if (document.getElementById(`piece-${pieceToUnlock}`)) {
                    document.getElementById(`piece-${pieceToUnlock}`).classList.add('unlocked');
                }
            }
            if (currentLevel >= totalLevels) {
                document.getElementById('final-screen').style.display = 'flex';
            } else {
                nextLevel();
            }
        }

        function checkAnswer() {
            const input = document.getElementById('user-answer').value.trim().toLowerCase();
            const feedback = document.getElementById('feedback');
            const validAnswers = allLevels[currentLevel].a;

            const isCorrect = validAnswers.some(ans => ans.toLowerCase() === input);

            if (isCorrect) {
                feedback.style.color = "green";
                feedback.innerText = "إجابة صحيحة! ✨ ظهرت قطعة جديدة.";
                
                const pieceToUnlock = piecesOrder[currentLevel];
                document.getElementById(`piece-${pieceToUnlock}`).classList.add('unlocked');
                
                currentLevel++;
                // حفظ المستوى في ذاكرة المتصفح
                localStorage.setItem('timi_game_level', currentLevel);

                if (currentLevel >= totalLevels) {
                    setTimeout(() => {
                        document.getElementById('final-screen').style.display = 'flex';
                    }, 1000);
                } else {
                    setTimeout(nextLevel, 600);
                }
            } else {
                feedback.style.color = "red";
                feedback.innerText = "إجابة خاطئة، حاولي مرة أخرى يا تيمي! ❌";
            }
        }

        function nextLevel() {
            document.getElementById('level-indicator').innerText = `المستوى ${currentLevel + 1} / 100`;
            document.getElementById('question-text').innerText = allLevels[currentLevel].q;
            document.getElementById('user-answer').value = "";
            document.getElementById('feedback').innerText = "";
        }

        function resetGame() {
            if (confirm("هل تريدين إعادة اللعبة من المستوى الأول؟")) {
                localStorage.removeItem('timi_game_level');
                localStorage.removeItem('timi_pieces_order');
                location.reload();
            }
        }

        restoreProgress();
    </script>
</body>
</html>
