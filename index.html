<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة تيمي الخاصة 💖</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff0f3;
            color: #4a4a4a;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: #ff4d6d; margin-bottom: 10px; }

        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }

        .level-badge {
            background: #ff758f;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            display: inline-block;
        }

        .question { font-size: 19px; font-weight: bold; margin-bottom: 20px; color: #590d22; }

        input[type="text"] {
            width: 85%;
            padding: 12px;
            border: 2px solid #ffb3c1;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            margin-bottom: 15px;
            text-align: center;
        }

        button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 17px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
        }

        #feedback { margin-top: 10px; font-weight: bold; height: 20px; }

        .puzzle-title { margin-top: 20px; font-weight: bold; color: #ff4d6d; }
        
        #puzzle-box {
            width: 300px;
            height: 400px;
            border: 5px solid #ff4d6d;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            background-color: #ffe5ec;
            margin: 15px auto;
            position: relative;
            overflow: hidden;
        }

        .piece {
            width: 30px;
            height: 40px;
            border: 0.1px solid rgba(255, 255, 255, 0.2);
            background-repeat: no-repeat;
            background-size: 300px 400px;
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }

        .piece.unlocked { opacity: 1; border: none; }

        #final-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 240, 243, 0.98);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>🌸 رحلة تيمي 🌸</h1>

    <div class="container">
        <div class="level-badge" id="level-indicator">المستوى 1 / 100</div>
        <div class="question" id="question-text">جاري التحميل...</div>
        
        <div id="game-ui">
            <input type="text" id="user-answer" placeholder="اكتبي الإجابة هنا..." autocomplete="off">
            <br>
            <button onclick="checkAnswer()">تأكيد الإجابة ✨</button>
        </div>
        <div id="feedback"></div>
    </div>

    <div class="puzzle-title">📦 صندوق تجميع الصورة السرية</div>
    <div id="puzzle-box"></div>

    <div id="final-screen">
        <h1 style="font-size: 32px;">🎉 مبروك يا تيمي! 🎉</h1>
        <p style="font-size: 18px;">لقد جمعتِ الـ 100 قطعة واكتملت الصورة بنجاح ✨</p>
        <div id="final-image-container" style="width:300px; height:400px; border: 5px solid #ff4d6d; border-radius: 12px; background-size: cover; background-image: url('../input_file_0.png');"></div>
        <br>
        <button onclick="location.reload()">إعادة اللعب ❤️</button>
    </div>

    <script>
        const imageUrl = '../input_file_0.png';
        const totalLevels = 100;
        let currentLevel = 0;

        // قائمة متنوعة تجمع بين الألغاز والرياضيات والمعلومات العامة السهلة
        const baseQuestions = [
            // ألغاز خفيفة
            { q: "لغز: ما هو الشيء الذي له عين واحدة ولكنه لا يرى؟", a: "الابرة" },
            { q: "لغز: شيء يطير بلا أجنحة ويبكي بلا عيون، فما هو؟", a: "السحاب" },
            { q: "لغز: ما هو الشيء الذي كلما أخذت منه كبر؟", a: "الحفرة" },
            { q: "لغز: ما هو الشيء الذي يمشي بلا أقدام ويدخل الأذنين؟", a: "الصوت" },
            { q: "لغز: ما هو الشيء الذي يتكلم جميع اللغات لكنه بلا لسان؟", a: "الصدى" },
            { q: "لغز: ما هو الشيء الذي يمكنك إعطاؤه ولا يمكنك استرداده إلا بالوفاء؟", a: "الوعد" },
            
            // أسئلة معلومات عامة سهلة
            { q: "معلومات عامة: ما هي عاصمة جمهورية مصر العربية؟", a: "القاهرة" },
            { q: "معلومات عامة: ما هو أسرع حيوان بري في العالم؟", a: "الفهد" },
            { q: "معلومات عامة: كم عدد ألوان قوس قزح؟", a: "7" },
            { q: "معلومات عامة: ما هو الكوكب المقرب باسم الكوكب الأحمر؟", a: "المريخ" },
            { q: "معلومات عامة: ما هو أكبر طائر في العالم لا يطير؟", a: "النعامة" },
            { q: "معلومات عامة: كم عدد أيام الأسبوع؟", a: "7" },
            { q: "معلومات عامة: ما هي الوجبة الأساسية التي نأكلها صباحاً؟", a: "الافطار" },
            
            // مسائل رياضية سهلة
            { q: "رياضيات: ما هو ناتج 5 + 5 ؟", a: "10" },
            { q: "رياضيات: ما هو ناتج 12 - 4 ؟", a: "8" },
            { q: "رياضيات: ما هو ناتج 3 × 3 ؟", a: "9" },
            { q: "رياضيات: ما هو ناتج 20 ÷ 2 ؟", a: "10" },
            { q: "رياضيات: ما هو ناتج 15 + 15 ؟", a: "30" },
            { q: "رياضيات: كم عدد أضلاع المربع؟", a: "4" },
            { q: "رياضيات: ما هو نصف العدد 50؟", a: "25" },
            { q: "رياضيات: كم يساوي 10 × 10 ؟", a: "100" }
        ];

        // تكرار توليد أسئلة رياضية وألغاز سهلة لبقية الـ 100 مستوى
        const allLevels = [];
        
        for (let i = 0; i < totalLevels; i++) {
            if (i < baseQuestions.length) {
                allLevels.push(baseQuestions[i]);
            } else {
                // توليد أسئلة رياضيات وألغاز سهلة ومباشرة
                const type = i % 3;
                if (type === 0) {
                    allLevels.push({ q: `مسألة رياضية: ما هو ناتج ${i} + 10 ؟`, a: `${i + 10}` });
                } else if (type === 1) {
                    allLevels.push({ q: `حساب سريع: ما هو ضعف العدد ${i} ؟`, a: `${i * 2}` });
                } else {
                    allLevels.push({ q: `تحدي ذكاء: كم يساوي ${i + 5} - 5 ؟`, a: `${i}` });
                }
            }
        }

        // خلط القطع عشوائياً
        let piecesOrder = Array.from({length: 100}, (_, i) => i);
        piecesOrder = piecesOrder.sort(() => Math.random() - 0.5);

        // إنشاء الـ 100 قطعة
        const puzzleBox = document.getElementById('puzzle-box');
        for (let i = 0; i < 100; i++) {
            const piece = document.createElement('div');
            piece.className = 'piece';
            piece.id = `piece-${i}`;
            const row = Math.floor(i / 10);
            const col = i % 10;
            piece.style.backgroundImage = `url('${imageUrl}')`;
            piece.style.backgroundPosition = `-${col * 30}px -${row * 40}px`;
            puzzleBox.appendChild(piece);
        }

        function checkAnswer() {
            const input = document.getElementById('user-answer').value.trim();
            const feedback = document.getElementById('feedback');

            if (input.toLowerCase() === allLevels[currentLevel].a.toLowerCase()) {
                feedback.style.color = "green";
                feedback.innerText = "إجابة صحيحة! ✨ تم كشف قطعة من الصورة.";
                
                const pieceToUnlock = piecesOrder[currentLevel];
                document.getElementById(`piece-${pieceToUnlock}`).classList.add('unlocked');
                
                currentLevel++;

                if (currentLevel >= totalLevels) {
                    setTimeout(() => {
                        document.getElementById('final-screen').style.display = 'flex';
                    }, 1000);
                } else {
                    setTimeout(nextLevel, 600);
                }
            } else {
                feedback.style.color = "red";
                feedback.innerText = "إجابة خاطئة، حاولي مرة أخرى يا تيمي! ❌";
            }
        }

        function nextLevel() {
            document.getElementById('level-indicator').innerText = `المستوى ${currentLevel + 1} / 100`;
            document.getElementById('question-text').innerText = allLevels[currentLevel].q;
            document.getElementById('user-answer').value = "";
            document.getElementById('feedback').innerText = "";
        }

        nextLevel();
    </script>
</body>
</html>
