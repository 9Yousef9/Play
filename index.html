<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة تيمي الخاصة 💖</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff0f3;
            color: #4a4a4a;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: #ff4d6d; margin-top: 10px; margin-bottom: 10px; font-size: 26px; }

        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
            margin-bottom: 15px;
        }

        .level-badge {
            background: #ff758f;
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 15px;
            display: inline-block;
        }

        .question { 
            font-size: 19px; 
            font-weight: bold; 
            margin-bottom: 20px; 
            color: #590d22;
            line-height: 1.4;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .option-btn {
            background: #ffe5ec;
            color: #590d22;
            border: 2px solid #ffb3c1;
            padding: 12px 20px;
            font-size: 17px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            text-align: center;
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        .reset-btn {
            background: #adb5bd;
            color: white;
            border: none;
            font-size: 13px;
            padding: 7px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        #feedback { 
            margin-top: 10px; 
            font-weight: bold; 
            font-size: 16px;
            min-height: 24px; 
        }

        .puzzle-title { margin-top: 10px; font-weight: bold; color: #ff4d6d; font-size: 18px; }
        
        #puzzle-box {
            width: 300px;
            height: 400px;
            border: 5px solid #ff4d6d;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            background-color: #ffe5ec;
            margin: 10px auto;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.2);
        }

        .piece {
            width: 30px;
            height: 40px;
            border: 0.1px solid rgba(255, 255, 255, 0.2);
            background-repeat: no-repeat;
            background-size: 300px 400px;
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }

        .piece.unlocked { opacity: 1; border: none; }

        #final-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 240, 243, 0.98);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <h1>🌸 رحلة تيمي 🌸</h1>

    <div class="container">
        <div class="level-badge" id="level-indicator">المستوى 1 / 100</div>
        <div class="question" id="question-text">جاري التحميل...</div>
        
        <div class="options-container" id="options-box"></div>

        <div id="feedback"></div>

        <button class="reset-btn" onclick="resetGame()">إعادة اللعبة من الأول 🔄</button>
    </div>

    <div class="puzzle-title">📦 صندوق تجميع الصورة السرية</div>
    <div id="puzzle-box"></div>

    <div id="final-screen">
        <h1 style="font-size: 30px;">🎉 مبروك يا تيمي! 🎉</h1>
        <p style="font-size: 18px; color: #590d22;">لقد جمعتِ الـ 100 قطعة واكتملت الصورة بنجاح ✨</p>
        <div id="final-image-container" style="width:300px; height:400px; border: 5px solid #ff4d6d; border-radius: 12px; background-size: cover; background-image: url('input_file_0.png');"></div>
        <br>
        <button class="option-btn" style="background:#ff4d6d; color:white; width:200px;" onclick="resetGame()">إعادة اللعب ❤️</button>
    </div>

    <script>
        const imageUrl = 'input_file_0.png';
        const totalLevels = 100;

        // استرجاع التقدم المحفوظ من ذاكرة المتصفح
        let currentLevel = parseInt(localStorage.getItem('timi_game_level')) || 0;

        // أسئلة سهلة جداً بنظام خيارات
        const baseQuestions = [
            {
                q: "ما هو لون السماء الصافية في النهار؟",
                options: ["أحمر", "أزرق", "أخضر"],
                correct: "أزرق"
            },
            {
                q: "كم عدد أيام الأسبوع؟",
                options: ["5 أيام", "7 أيام", "10 أيام"],
                correct: "7 أيام"
            },
            {
                q: "ما هو الشيء الذي يزيد إذا تشاركته ويكبر بالحب؟",
                options: ["الحب", "المال", "الطعام"],
                correct: "الحب"
            },
            {
                q: "ما هو ناتج 5 + 5 ؟",
                options: ["8", "10", "12"],
                correct: "10"
            },
            {
                q: "ما هو الشيء الذي يتكلم جميع اللغات لكنه بلا لسان؟",
                options: ["الصدى", "الهاتف", "الكتاب"],
                correct: "الصدى"
            },
            {
                q: "ما هو الشيء الذي له عين واحدة ولكنه لا يرى؟",
                options: ["القلم", "الإبرة", "النظارة"],
                correct: "الإبرة"
            },
            {
                q: "ما هو ناتج 2 + 2 ؟",
                options: ["3", "4", "5"],
                correct: "4"
            },
            {
                q: "ما هو لون القلوب الشائع للتعبر عن الحب؟",
                options: ["أصفر", "أحمر", "أسود"],
                correct: "أحمر"
            },
            {
                q: "ما هو ناتج 10 - 5 ؟",
                options: ["3", "5", "7"],
                correct: "5"
            },
            {
                q: "من هو أكثر شخص يحب تيمي في العالم؟",
                options: ["يوسف ❤️", "لا أحد", "شخص آخر"],
                correct: "يوسف ❤️"
            }
        ];

        // توليد بقية المستويات الـ 100 بأسئلة سهلة جداً مع 3 خيارات
        const allLevels = [];
        for (let i = 0; i < totalLevels; i++) {
            if (i < baseQuestions.length) {
                allLevels.push(baseQuestions[i]);
            } else {
                const ans = i + 2;
                allLevels.push({
                    q: `تحدي سريع: ما هو ناتج ${i + 1} + 1 ؟`,
                    options: [`${ans - 1}`, `${ans}`, `${ans + 1}`],
                    correct: `${ans}`
                });
            }
        }

        // إنشاء أو استرجاع الترتيب العشوائي للقطع
        let piecesOrder = JSON.parse(localStorage.getItem('timi_pieces_order'));
        if (!piecesOrder) {
            piecesOrder = Array.from({length: 100}, (_, i) => i).sort(() => Math.random() - 0.5);
            localStorage.setItem('timi_pieces_order', JSON.stringify(piecesOrder));
        }

        // بناء الشبكة الصندوقية
        const puzzleBox = document.getElementById('puzzle-box');
        for (let i = 0; i < 100; i++) {
            const piece = document.createElement('div');
            piece.className = 'piece';
            piece.id = `piece-${i}`;
            const row = Math.floor(i / 10);
            const col = i % 10;
            piece.style.backgroundImage = `url('${imageUrl}')`;
            piece.style.backgroundPosition = `-${col * 30}px -${row * 40}px`;
            puzzleBox.appendChild(piece);
        }

        // استرجاع التقدم عند فتح الصفحة
        function restoreProgress() {
            for (let i = 0; i < currentLevel; i++) {
                const pieceToUnlock = piecesOrder[i];
                if (document.getElementById(`piece-${pieceToUnlock}`)) {
                    document.getElementById(`piece-${pieceToUnlock}`).classList.add('unlocked');
                }
            }
            if (currentLevel >= totalLevels) {
                document.getElementById('final-screen').style.display = 'flex';
            } else {
                loadLevel();
            }
        }

        // عرض السؤال والخيارات
        function loadLevel() {
            document.getElementById('level-indicator').innerText = `المستوى ${currentLevel + 1} / 100`;
            document.getElementById('question-text').innerText = allLevels[currentLevel].q;
            document.getElementById('feedback').innerText = "";

            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = "";

            allLevels[currentLevel].options.forEach(optionText => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = optionText;
                btn.onclick = () => selectAnswer(optionText);
                optionsBox.appendChild(btn);
            });
        }

        // التحقق من الإجابة
        function selectAnswer(selectedOption) {
            const feedback = document.getElementById('feedback');
            const correctAnswer = allLevels[currentLevel].correct;

            if (selectedOption === correctAnswer) {
                feedback.style.color = "green";
                feedback.innerText = "إجابة صحيحة! ✨ ظهرت قطعة جديدة في الصندوق.";

                // إظهار القطعة
                const pieceToUnlock = piecesOrder[currentLevel];
                document.getElementById(`piece-${pieceToUnlock}`).classList.add('unlocked');

                currentLevel++;
                // حفظ المستوى
                localStorage.setItem('timi_game_level', currentLevel);

                if (currentLevel >= totalLevels) {
                    setTimeout(() => {
                        document.getElementById('final-screen').style.display = 'flex';
                    }, 1000);
                } else {
                    setTimeout(loadLevel, 600);
                }
            } else {
                feedback.style.color = "red";
                feedback.innerText = "إجابة خاطئة، حاولي مرة أخرى يا تيمي! ❌";
            }
        }

        // إعادة اللعبة
        function resetGame() {
            if (confirm("هل تريدين إعادة اللعبة من المستوى الأول؟")) {
                localStorage.removeItem('timi_game_level');
                localStorage.removeItem('timi_pieces_order');
                location.reload();
            }
        }

        restoreProgress();
    </script>
</body>
</html>
