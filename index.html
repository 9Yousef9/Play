<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>رحلة تيمي الخاصة 💖</title>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --primary-hover: #ff758f;
            --secondary-color: #590d22;
            --bg-gradient-start: #ffe5ec;
            --bg-gradient-end: #ffc2d1;
            --card-bg: rgba(255, 255, 255, 0.96);
            --border-color: #ffb3c1;
            --success-color: #2b9348;
            --error-color: #d90429;
            --shadow-color: rgba(255, 77, 109, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: #4a4a4a;
            min-height: 100vh;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-x: hidden;
            position: relative;
        }

        h1.main-title {
            color: var(--primary-color);
            font-size: 28px;
            margin-bottom: 15px;
            text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .main-card {
            background: var(--card-bg);
            padding: 25px 20px;
            border-radius: 24px;
            box-shadow: 0 15px 35px var(--shadow-color);
            max-width: 450px;
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-color);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 10;
        }

        .shake {
            animation: shakeAnim 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        @keyframes shakeAnim {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        .level-badge {
            background: linear-gradient(45deg, var(--primary-hover), var(--primary-color));
            color: white;
            padding: 6px 22px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 15px;
            display: inline-block;
            box-shadow: 0 4px 12px rgba(255, 77, 109, 0.3);
        }

        .progress-container {
            width: 100%;
            background-color: var(--bg-gradient-start);
            border-radius: 12px;
            height: 12px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary-hover), var(--primary-color));
            border-radius: 12px;
            transition: width 0.5s ease-in-out;
        }

        .question {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 22px;
            color: var(--secondary-color);
            line-height: 1.5;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .option-btn {
            background: #ffffff;
            color: var(--secondary-color);
            border: 2px solid var(--border-color);
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            width: 100%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.03);
            outline: none;
        }

        .option-btn:hover {
            background: var(--bg-gradient-start);
            border-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 77, 109, 0.2);
        }

        .reset-btn {
            background: transparent;
            color: #8a8a8a;
            border: 1px dashed #adb5bd;
            font-size: 12px;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }

        #feedback {
            margin-top: 12px;
            font-weight: bold;
            font-size: 15px;
            min-height: 24px;
        }

        .puzzle-title {
            margin-top: 5px;
            font-weight: bold;
            color: var(--primary-color);
            font-size: 18px;
        }

        #puzzle-box {
            width: 300px;
            height: 400px;
            border: 5px solid var(--primary-color);
            border-radius: 18px;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            background-color: var(--bg-gradient-start);
            margin: 12px auto 30px auto;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px var(--shadow-color);
        }

        .piece {
            width: 30px;
            height: 40px;
            border: 0.1px solid rgba(255, 255, 255, 0.15);
            background-repeat: no-repeat;
            background-size: 300px 400px;
            opacity: 0;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .piece.unlocked {
            opacity: 1;
            border: none;
        }

        #final-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 240, 243, 0.98);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        #final-image-container {
            width: 300px;
            height: 400px;
            border: 5px solid var(--primary-color);
            border-radius: 18px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 12px 35px rgba(255, 77, 109, 0.4);
            margin: 15px 0;
        }

        canvas#confetti-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <h1 class="main-title">🌸 رحلة تيمي 🌸</h1>

    <div class="main-card" id="main-card">
        <div class="level-badge" id="level-indicator">المستوى 1 / 100</div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="question" id="question-text">جاري إعداد الألغاز...</div>
        
        <div class="options-container" id="options-box"></div>

        <div id="feedback"></div>

        <button class="reset-btn" onclick="resetGame()">إعادة اللعبة من البداية 🔄</button>
    </div>

    <div class="puzzle-title">📦 صندوق تجميع الصورة السرية</div>
    <div id="puzzle-box"></div>

    <div id="final-screen">
        <h1 style="font-size: 32px; color: var(--primary-color);">🎉 مبروك يا تيمي! 🎉</h1>
        <p style="font-size: 18px; color: var(--secondary-color); margin-top: 5px;">لقد جمعتِ الـ 100 قطعة واكتملت الصورة بنجاح ✨</p>
        <div id="final-image-container" style="background-image: url('input_file_0.png');"></div>
        <button class="option-btn" style="background: linear-gradient(45deg, var(--primary-hover), var(--primary-color)); color:white; width:220px; margin-top: 10px;" onclick="resetGame()">إعادة اللعب ❤️</button>
    </div>

    <script>
        const imageUrl = 'input_file_0.png';
        const totalLevels = 100;
        let currentLevel = parseInt(localStorage.getItem('timi_game_level')) || 0;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'success') {
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'error') {
                osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                osc.frequency.setValueAtTime(164.81, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // قائمة الـ 100 لغز الفريدة بدون أي تكرار
        const allLevels = [

            { q: "ما هو الشيء الذي له عين واحدة ولكنه لا يرى؟", options: ["الإبرة", "القلم", "النظارة"], correct: "الإبرة" },

            { q: "ما هو الشيء الذي يملك صفحات ولكن ليس له عقل؟", options: ["الكتاب", "الجوال", "المكتب"], correct: "الكتاب" },
            { q: "ما هي العضو المسؤول عن حاسة الشم؟", options: ["الأنف", "الأذن", "العين"], correct: "الأنف" },
            { q: "ما هو الفصل الصالح للسباحة والحرارة العالية؟", options: ["الصيف", "الشتاء", "الربيع"], correct: "الصيف" },
            { q: "ما هو المشروب الداكن الشهير للتركيز صباحاً؟", options: ["القهوة", "الماء", "الحليب"], correct: "القهوة" },
            { q: "كم نقطة توجد في حرف النون؟", options: ["نقطة واحدة", "نقطتان", "ثلاث نقاط"], correct: "نقطة واحدة" },
            { q: "ما هي الرياضة المشهورة بكرة قدم وركل؟", options: ["كرة القدم", "كرة السلة", "التنس"], correct: "كرة القدم" },
            { q: "ما هي الزهرة ذات الرائحة الجذابة واللون الأحمر؟", options: ["الوردة", "النعناع", "الشجرة"], correct: "الوردة" },
            { q: "ما هو الشيء الذي يملأ الغرفة دون أن يأخذ مساحة؟", options: ["الضوء", "الأثاث", "الماء"], correct: "الضوء" },
            { q: "ما هو القطب الذي تعيش فيه الدببة البيضاء؟", options: ["القطب الشمالي", "القطب الجنوبي", "الصحراء"], correct: "القطب الشمالي" },
            { q: "ما هي الأداة المستخدمة لقص الأوراق والقمط؟", options: ["المقص", "القلم", "المسطرة"], correct: "المقص" },
            { q: "ما هو اسم صغير الكلب؟", options: ["جرو", "هريرة", "كتكوت"], correct: "جرو" },
            { q: "ما هي العضو السمعي الرئيسي للسمع؟", options: ["الأذن", "الأنف", "الفم"], correct: "الأذن" },
            { q: "ما هي الفاكهة المشهورة بأنها تقي من أمراض الأطباء يومياً؟", options: ["التفاح", "الموز", "البرتقال"], correct: "التفاح" },
            { q: "ما هي الوجبة الأساسية الأولى عند الصباح؟", options: ["الإفطار", "الغداء", "العشاء"], correct: "الإفطار" },
            { q: "ما هو المحيط الأكبر في العالم؟", options: ["المحيط الهادئ", "المحيط الأطلسي", "المحيط الهندي"], correct: "المحيط الهادئ" },
            { q: "ما هو الشيء الذي يحمي الرأس عند ركوب الدراجة؟", options: ["الخوذة", "النظارة", "القبعة"], correct: "الخوذة" },
            { q: "ما هي أداة الكتابة الشهيرة التي يسهل مسحها بالممحاة؟", options: ["قلم الرصاص", "قلم الحبر", "الطباشير"], correct: "قلم الرصاص" },
            { q: "ما هو الحيوان ذو الخطوط السوداء والبيضاء؟", options: ["الحمار الوحشي", "النمر", "الذئب"], correct: "الحمار الوحشي" },
            { q: "ما هو المشروب الطبيعي الذي يصنعه النحل؟", options: ["العسل", "الماء", "العصير"], correct: "العسل" },
            { q: "ما هي الدولة المشهورة بساعة بن بن (Big Ben)؟", options: ["بريطانيا", "أمريكا", "إيطاليا"], correct: "بريطانيا" },
            { q: "ما هو المكان الخصيب في وسط الصحراء الجافة؟", options: ["الواحة", "الجبل", "البحر"], correct: "الواحة" },
            { q: "ما هو الشيء الذي تطير به في ألعاب الورق؟", options: ["الطائرة الورقية", "الكرة", "البلون"], correct: "الطائرة الورقية" },
            { q: "ما هو الجهاز المستخدم لحفظ الأطعمة من التلف بالبرودة؟", options: ["الثلاجة", "الفرن", "الغسالة"], correct: "الثلاجة" },
            { q: "ما هو التخصص الذي يعالج المرضى؟", options: ["الطب", "الهندسة", "التجارة"], correct: "الطب" },
            { q: "كم عدد أصابع اليد الواحدة لدى الإنسان؟", options: ["5 أصابع", "4 أصابع", "6 أصابع"], correct: "5 أصابع" },
            { q: "ما هو الشيء الذي نراه في المرآة؟", options: ["صورتنا", "الظل", "الضوء"], correct: "صورتنا" },
            { q: "ما هي العاصمة الإيطالية الشهيرة للبيتزا والآثار؟", options: ["روما", "باريس", "مدريد"], correct: "روما" },
            { q: "ما هو اللون المميز للشجر والنباتات الطبيعية؟", options: ["الأخضر", "الأزرق", "الأصفر"], correct: "الأخضر" },
            { q: "ما هو الحرف الأول من الأبجدية العربية؟", options: ["الألف (أ)", "الباء (ب)", "التاء (ت)"], correct: "الألف (أ)" },
            { q: "ما هي الوسيلة التي ترسلنا إلى الفضاء الخارجي؟", options: ["الصاروخ", "الطائرة", "السيارة"], correct: "الصاروخ" },
            { q: "ما هي الأداة المستخدمة لمعرفة الاتجاهات أينما كنت؟", options: ["البوصلة", "الساعة", "المسطرة"], correct: "البوصلة" },
            { q: "من هي أغلى وأحلى تيمي في الدنيا؟", options: ["تيمي الجميلة ❤️", "لا أحد", "شخص آخر"], correct: "تيمي الجميلة ❤️" }
        ];

        let piecesOrder = JSON.parse(localStorage.getItem('timi_pieces_order'));
        if (!piecesOrder) {
            piecesOrder = Array.from({length: totalLevels}, (_, i) => i).sort(() => Math.random() - 0.5);
            localStorage.setItem('timi_pieces_order', JSON.stringify(piecesOrder));
        }

        const puzzleBox = document.getElementById('puzzle-box');
        for (let i = 0; i < totalLevels; i++) {
            const piece = document.createElement('div');
            piece.className = 'piece';
            piece.id = `piece-${i}`;
            const row = Math.floor(i / 10);
            const col = i % 10;
            piece.style.backgroundImage = `url('${imageUrl}')`;
            piece.style.backgroundPosition = `-${col * 30}px -${row * 40}px`;
            puzzleBox.appendChild(piece);
        }

        function restoreProgress() {
            for (let i = 0; i < currentLevel; i++) {
                const pieceToUnlock = piecesOrder[i];
                const pieceElem = document.getElementById(`piece-${pieceToUnlock}`);
                if (pieceElem) pieceElem.classList.add('unlocked');
            }
            if (currentLevel >= totalLevels) {
                document.getElementById('final-screen').style.display = 'flex';
            } else {
                loadLevel();
            }
        }

        function loadLevel() {
            document.getElementById('level-indicator').innerText = `المستوى ${currentLevel + 1} / ${totalLevels}`;
            const percentage = (currentLevel / totalLevels) * 100;
            document.getElementById('progress-bar').style.width = `${percentage}%`;

            document.getElementById('question-text').innerText = `لغز (${currentLevel + 1}): ${allLevels[currentLevel].q}`;
            document.getElementById('feedback').innerText = "";

            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = "";

            allLevels[currentLevel].options.forEach(optionText => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = optionText;
                btn.onclick = () => selectAnswer(optionText);
                optionsBox.appendChild(btn);
            });
        }

        function selectAnswer(selectedOption) {
            const feedback = document.getElementById('feedback');
            const mainCard = document.getElementById('main-card');
            const correctAnswer = allLevels[currentLevel].correct;

            if (selectedOption === correctAnswer) {
                playSound('success');
                feedback.style.color = "var(--success-color)";
                feedback.innerText = "إجابة صحيحة! ✨ تم فتح قطعة جديدة في الصندوق.";

                const pieceToUnlock = piecesOrder[currentLevel];
                document.getElementById(`piece-${pieceToUnlock}`).classList.add('unlocked');

                currentLevel++;
                localStorage.setItem('timi_game_level', currentLevel);

                if (currentLevel >= totalLevels) {
                    setTimeout(() => {
                        document.getElementById('final-screen').style.display = 'flex';
                    }, 600);
                } else {
                    setTimeout(loadLevel, 500);
                }
            } else {
                playSound('error');
                mainCard.classList.add('shake');
                setTimeout(() => mainCard.classList.remove('shake'), 450);

                feedback.style.color = "var(--error-color)";
                feedback.innerText = "إجابة خاطئة، حاولي مرة أخرى يا تيمي! ❌";
            }
        }

        function resetGame() {
            if (confirm("هل تريدين إعادة اللعبة وبدء التجميع من المستوى الأول؟")) {
                localStorage.removeItem('timi_game_level');
                localStorage.removeItem('timi_pieces_order');
                location.reload();
            }
        }

        restoreProgress();
    </script>
</body>
</html>
